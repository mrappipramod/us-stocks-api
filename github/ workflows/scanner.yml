name: NASDAQ Scanner

on:
  schedule:
    # Pre-market: 6:00 AM ET Mon-Fri (11:00 UTC)
    - cron: '0 11 * * 1-5'
    # End-of-day: 4:30 PM ET Mon-Fri (21:30 UTC)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:          # also allow manual trigger from GitHub UI
    inputs:
      limit:
        description: 'Max tickers (leave blank for full scan)'
        required: false
      tickers:
        description: 'Specific tickers (comma-separated, overrides limit)'
        required: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner (manual with specific tickers)
        if: github.event.inputs.tickers != ''
        env:
          PROXY_BASE: ${{ secrets.PROXY_BASE }}
          OUTPUT_DIR: ./scanner_output
        run: |
          python nasdaq_scanner.py \
            --tickers "${{ github.event.inputs.tickers }}" \
            --concurrency 3

      - name: Run scanner (manual with limit)
        if: github.event.inputs.limit != '' && github.event.inputs.tickers == ''
        env:
          PROXY_BASE: ${{ secrets.PROXY_BASE }}
          OUTPUT_DIR: ./scanner_output
        run: |
          python nasdaq_scanner.py \
            --limit "${{ github.event.inputs.limit }}" \
            --concurrency 3

      - name: Run full scanner (scheduled)
        if: github.event_name == 'schedule'
        env:
          PROXY_BASE: ${{ secrets.PROXY_BASE }}
          OUTPUT_DIR: ./scanner_output
        run: |
          python nasdaq_scanner.py \
            --concurrency 4 \
            --csv nasdaq-listed.csv

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: scanner_output/
          retention-days: 30

      - name: Commit latest.json back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scanner_output/latest.json scanner_output/top_picks_latest.json || true
          git diff --staged --quiet || git commit -m "scanner: update latest results [skip ci]"
          git push || true
