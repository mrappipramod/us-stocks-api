name: Update US Stock Data

on:
  schedule:
    # Run twice a day on weekdays: 11:00 UTC (≈6 AM ET) and 21:00 UTC (≈4 PM ET)
    - cron: '0 11 * * 1-5'
    - cron: '0 21 * * 1-5'
    # Optional: also run on weekends once a day
    - cron: '0 12 * * 6,0'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push commits
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data collector
        run: python scripts/collector.py

      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update stock data [skip ci]"
          git push
